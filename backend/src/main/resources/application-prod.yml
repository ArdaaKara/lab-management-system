spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
  jpa:
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.clms: WARN
    root: WARN

springdoc:
  swagger-ui:
    enabled: false

server:
  error:
    include-stacktrace: never
    include-message: never
